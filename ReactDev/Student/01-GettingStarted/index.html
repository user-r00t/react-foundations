<!DOCTYPE html>
<html>
<head>
    <title>My Library</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>

</head>
<body>

<script type="importmap">
{
    "imports": {
        "react": "https://esm.sh/react?dev",
        "react-dom/client": "https://esm.sh/react-dom/client?dev"
    }
}
</script>

<script>

    class Book {
        constructor(title, author) {
            this.title = title
            this.author = author
        }

        toString() {
            return `${this.title}, by ${this.author}`
        }
    }

    class Film {
        constructor(name, genre, blurb) {
            this.name = name
            this.genre = genre
            this.blurb = blurb
        }

        toString() {
            return `${this.name} [${this.genre}], ${this.blurb}`
        }
    }

    const books = [
        new Book('Millennium', 'Stieg Larsson'),
        new Book('A Christmas Carol', 'Charles Dickens'),
        new Book('The Son', 'Jo Nesbo'),
    ]

    const films = [
        new Film('Airplane', 'Comedy', 'Classic plane spoof'),
        new Film('Skyfall', 'Adventure', 'Bond spy yarn'),
        new Film('Love Actually', 'RomCom', ' Hugh Grant playing Hugh Grant')
    ]
    
</script>

<script type="module">
    import React from "react"
    import { createRoot } from "react-dom/client"
    
  

    const booksList = React.createElement(
        'ul', 
        null, 
        books.map((p, i) => React.createElement("li", {key: i}, p))
    )
    
    const filmsList = React.createElement(
        'ul', 
        null, 
        films.map((s, i) => React.createElement("li", {key: i}, s))
    )
    
    const retailer = React.createElement('div', null,
        React.createElement('h1', null, 'My Library'),
        React.createElement('h1', null, 'Books'),
        booksList,
        React.createElement('h1', null, 'Films'),
        filmsList
    )
    
    const root = createRoot(document.getElementById('root'))
    root.render(retailer)

</script>

</body>
</html>
